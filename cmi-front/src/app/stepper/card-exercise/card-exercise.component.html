<div cdkDropListGroup class="container">
  <div class="header-grid">
    <div>
      <h2>{{!finished ? 'Clasificación ' + classificationStageLabel: 'Ejercicio completado'}} </h2>
      <mat-progress-bar style="width: 70%;" mode="determinate" value={{stagePercentage}}></mat-progress-bar>
      <h3 style="font-weight: 500; margin-top: 2em;" *ngIf="indicationLabel">{{indicationLabel}}</h3>
    </div>
    <div class="criterio-wrap">
      <mat-form-field appearance="outline" class="form-field" style="display: block; width: 60%;">
        <mat-label>Criterio</mat-label>
        <input [disabled]="closedQuestions" matInput [(ngModel)]="classificationInput">
      </mat-form-field>
    </div>
    <div class="actions-wrap">
      <button (click)="openAddCategoryDialog()" *ngIf="!closedQuestions" mat-stroked-button color="primary" class="action-btn">
        <mat-icon>add</mat-icon> Añadir categoría
      </button>
      <button (click)="nextStage()" mat-flat-button color="primary" class="action-btn">{{!(allClassificationsCreated) ? "Guardar clasificación" : "Finalizar"}}</button>
      <button (click)="disableStopProgress()" *ngIf="stopProgress" mat-flat-button color="primary" class="action-btn">Segunda fase</button>
    </div>
  </div>

  <div class="categories-grid" *ngIf="categories.length > 0">
    <div class="example-container" *ngFor="let category of categories" cdkDrag>
      <div class="category-header">
        <h2>{{category.name}}</h2>
        <button mat-icon-button *ngIf="!closedQuestions" (click)="removeCategory(category)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
      <div cdkDropList [cdkDropListData]="category.cards" class="example-list" (cdkDropListDropped)="drop($event)">
        <div class="example-box" *ngFor="let item of category.cards" cdkDrag style="display: block;">
          <span *ngIf="!getCard(item)?.onlyShowImage">{{item}}</span>
          <div *ngIf="getCard(item)?.files![0]" style="width: 100%; text-align: center;">
            <br *ngIf="!getCard(item)?.onlyShowImage">
            <img style="height: 6rem; border-radius: 4px;" src={{getCard(item)?.files![0]}} />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div cdkDropList [cdkDropListData]="namedCards" class="horizontal-drag-drop-list"
    (cdkDropListDropped)="drop($event)">
    <div class="horizontal-drag-drop-item" *ngFor="let item of namedCards" cdkDrag>
      <button *ngIf="categories.length > 0" mat-icon-button class="card-menu-btn"
        [matMenuTriggerFor]="cardMenu" (click)="$event.stopPropagation()"
        title="Asignar a categoría">
        <mat-icon>add</mat-icon>
      </button>
      <mat-menu #cardMenu="matMenu">
        <button mat-menu-item *ngFor="let category of categories"
          (click)="moveCardToCategory(item, category)">
          {{ category.name }}
        </button>
      </mat-menu>
      <span *ngIf="!getCard(item)?.onlyShowImage">{{item}}</span>
      <div *ngIf="getCard(item)?.files![0]" style="width: 100%; text-align: center;">
        <br *ngIf="!getCard(item)?.onlyShowImage">
        <img (click)="toggleMaximize(getCard(item)?.files![0])" style="height: 6rem; border-radius: 4px;" src={{getCard(item)?.files![0]}} />
      </div>
    </div>
  </div>
</div>
