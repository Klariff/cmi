<h1 mat-dialog-title>{{action == 'edit' ? "Edición tarjeta" : "Creación tarjeta"}}</h1>
<div mat-dialog-content>
  <mat-form-field style="width: 100%;">
    <mat-label>Nombre</mat-label>
    <input matInput [(ngModel)]="name">
  </mat-form-field>
  <br>
  <mat-form-field style="width: 100%;">
    <mat-label>Número</mat-label>
    <input matInput type="number" [(ngModel)]="code">
  </mat-form-field>
  <div style="text-align: center; width: 100%;">
    <img id="blah" *ngIf="imageSrc" [src]="imageSrc" alt="your image" style="width: 10rem; border-radius: 3px;" />
  </div>
  <mat-checkbox class="example-margin" *ngIf="imageSrc" color="primary" [(ngModel)]="onlyShowImage">Sólo mostrar imagen</mat-checkbox>
</div>
<mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="close()" style="margin-right: 1rem;">Cancelar</button>
  <div *ngIf="!imageSrc && cardData.card">
    <input #csvInput hidden="true" type="file" onclick="this.value=null" (change)="fileLoad($event)" accept="image/*" />
    <button mat-flat-button color="primary" (click)="csvInput.click()">Añadir imagen</button>
  </div>
  <div *ngIf="imageSrc">
    <button mat-flat-button color="primary" (click)="deleteImage()">Eliminar imagen</button>
  </div>
  <button mat-flat-button color="primary" (click)="submit()" style="margin-left: 1rem;">Guardar</button>
</mat-dialog-actions>
