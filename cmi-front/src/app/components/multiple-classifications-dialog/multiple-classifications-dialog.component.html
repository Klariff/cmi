<h1 mat-dialog-title>Clasificaciones adicionales</h1>
<div mat-dialog-content>
    ¿Desea guardar clasificaciones adicionales?
</div>
<mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog('continue')">No</button>
    <button mat-button (click)="closeDialog('stop')">Si</button>
</mat-dialog-actions>
