<h1 mat-dialog-title>Cambio de contraseña</h1>
<div mat-dialog-content>
  <mat-form-field style="width: 100%;">
    <mat-label>Contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="password1">
  </mat-form-field>
  <br>
  <mat-form-field style="width: 100%;">
    <mat-label>Confirmación contraseña</mat-label>
    <input matInput type="password" [(ngModel)]="password2">
  </mat-form-field>
  <br>
<mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="close()" style="margin-left: 1rem;">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" style="margin-left: 1rem;">Guardar</button>
</mat-dialog-actions>
