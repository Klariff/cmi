<h1 mat-dialog-title>{{action == 'unlink' ? "Desvincular usuario" : "Vincular usuario"}}</h1>
<div mat-dialog-content>
  <mat-form-field style="width: 100%;">
    <mat-label>Nombre de usuario</mat-label>
    <input matInput [(ngModel)]="username">
  </mat-form-field>
  <br>
</div>
<mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="close()" style="margin-left: 1rem;">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" style="margin-left: 1rem;">Guardar</button>
</mat-dialog-actions>
