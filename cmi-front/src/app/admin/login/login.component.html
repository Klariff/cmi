<div class="main-container">
    <h2>Inicio de sesión</h2>
    <br>
    <mat-form-field style="width: 100%;">
        <input matInput placeholder="Usuario" (keyup.enter)="login()" [(ngModel)]="username" name="user" required>
    </mat-form-field>
    <br>
    <mat-form-field style="width: 100%;">
        <input matInput type="password" placeholder="Contraseña" (keyup.enter)="login()" [(ngModel)]="password" name="password" required>
    </mat-form-field>
    <br>
    <div style="width: 100%; text-align: center;">
        <button mat-raised-button style="margin-bottom: 1rem; width:70%;margin-top: 1rem;" color="primary" (click)="login()">Iniciar sesión</button>
        <br>
        <button mat-raised-button color="primary" style="width: 70%;" (click)="signup()">Registrarse</button>
    </div>
</div>
