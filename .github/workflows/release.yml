name: Release

# Build a Tauri installer for every supported platform and attach the
# artifacts to a GitHub release. Triggers on a `v*` tag (e.g. `v1.0.0`)
# and is also runnable manually from the Actions tab for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.label }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            npm_arch: arm64
            npm_platform: darwin
            args: "--target aarch64-apple-darwin"
          - label: macos-x64
            # Cross-compile x86_64 from the Apple Silicon runner so we
            # don't depend on the perpetually-queued macos-13 runner.
            runner: macos-14
            target: x86_64-apple-darwin
            npm_arch: x64
            npm_platform: darwin
            args: "--target x86_64-apple-darwin"
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            npm_arch: x64
            npm_platform: win32
            args: ""
    runs-on: ${{ matrix.runner }}
    env:
      TARGET: ${{ matrix.target }}
      # prebuild-install (used by better-sqlite3 and friends) reads these
      # env vars to pick the right native binary, so cross-compile builds
      # bundle the correct .node files instead of the host's arch.
      npm_config_arch: ${{ matrix.npm_arch }}
      npm_config_target_arch: ${{ matrix.npm_arch }}
      npm_config_platform: ${{ matrix.npm_platform }}
      npm_config_target_platform: ${{ matrix.npm_platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cmi-app/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cmi-app/src-tauri/Cargo.lock') }}

      - name: Install backend dependencies
        shell: bash
        working-directory: cmi-back
        # npm_config_arch / npm_config_target_arch are exported on the job,
        # so prebuild-install (invoked by better-sqlite3's install script)
        # downloads the prebuild for the dmg's target arch instead of the
        # runner's host arch.
        run: npm install --omit=dev

      - name: Verify better-sqlite3 architecture
        if: runner.os != 'Windows'
        shell: bash
        working-directory: cmi-back
        env:
          NPM_ARCH: ${{ matrix.npm_arch }}
        # Sanity check: catch arch mismatches at CI time instead of on a
        # user's machine. Skip on Windows where `file` output differs.
        run: |
          case "$NPM_ARCH" in
            x64)   EXPECTED=x86_64 ;;
            arm64) EXPECTED=arm64  ;;
            *)     EXPECTED="$NPM_ARCH" ;;
          esac
          ARCH_OUT="$(file node_modules/better-sqlite3/build/Release/better_sqlite3.node)"
          echo "$ARCH_OUT"
          if ! echo "$ARCH_OUT" | grep -q "$EXPECTED"; then
            echo "::error::better-sqlite3 native module is not built for $EXPECTED (npm_arch=$NPM_ARCH)"
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci || npm install
        working-directory: cmi-front

      - name: Fetch sidecar binaries
        shell: bash
        working-directory: cmi-app
        run: |
          ./scripts/fetch-node.sh
          ./scripts/fetch-cloudflared.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cmi-app
          tagName: ${{ github.ref_name }}
          releaseName: "CMI ${{ github.ref_name }}"
          releaseBody: "Automated build for ${{ github.ref_name }}."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
