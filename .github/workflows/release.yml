name: Release

# Build a Tauri installer for every supported platform and attach the
# artifacts to a GitHub release. Triggers on a `v*` tag (e.g. `v1.0.0`)
# and is also runnable manually from the Actions tab for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.label }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            npm_arch: arm64
            npm_platform: darwin
            args: "--target aarch64-apple-darwin"
          - label: macos-x64
            # Cross-compile x86_64 from the Apple Silicon runner so we
            # don't depend on the perpetually-queued macos-13 runner.
            runner: macos-14
            target: x86_64-apple-darwin
            npm_arch: x64
            npm_platform: darwin
            args: "--target x86_64-apple-darwin"
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            npm_arch: x64
            npm_platform: win32
            args: ""
    runs-on: ${{ matrix.runner }}
    env:
      TARGET: ${{ matrix.target }}
      # prebuild-install (used by better-sqlite3 and friends) reads these
      # env vars to pick the right native binary, so cross-compile builds
      # bundle the correct .node files instead of the host's arch.
      npm_config_arch: ${{ matrix.npm_arch }}
      npm_config_target_arch: ${{ matrix.npm_arch }}
      npm_config_platform: ${{ matrix.npm_platform }}
      npm_config_target_platform: ${{ matrix.npm_platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cmi-app/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cmi-app/src-tauri/Cargo.lock') }}

      - name: Install backend dependencies
        shell: bash
        working-directory: cmi-back
        run: npm install --omit=dev

      - name: Force-fetch better-sqlite3 prebuild for ${{ matrix.npm_arch }}
        # Defensive: even with npm_config_arch set above, the install
        # script can fall back to the host arch on some hosts. Explicitly
        # re-fetch the prebuild for the target arch so we never ship a
        # mismatched .node file.
        shell: bash
        working-directory: cmi-back/node_modules/better-sqlite3
        run: |
          rm -rf build
          npx --no-install prebuild-install --runtime napi --arch ${{ matrix.npm_arch }} --platform ${{ matrix.npm_platform }}
          echo "--- final native module arch ---"
          file build/Release/better_sqlite3.node

      - name: Install frontend dependencies
        run: npm ci || npm install
        working-directory: cmi-front

      - name: Fetch sidecar binaries
        shell: bash
        working-directory: cmi-app
        run: |
          ./scripts/fetch-node.sh
          ./scripts/fetch-cloudflared.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cmi-app
          tagName: ${{ github.ref_name }}
          releaseName: "CMI ${{ github.ref_name }}"
          releaseBody: "Automated build for ${{ github.ref_name }}."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
