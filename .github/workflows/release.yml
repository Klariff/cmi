name: Release

# Build a Tauri installer for every supported platform and attach the
# artifacts to a GitHub release. Triggers on a `v*` tag (e.g. `v1.0.0`)
# and is also runnable manually from the Actions tab for testing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.label }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            npm_arch: arm64
            args: "--target aarch64-apple-darwin"
          - label: macos-x64
            # Run x86_64 on the same Apple Silicon runner instead of the
            # macos-13 queue, which can sit unscheduled for hours. We
            # cross-compile via rustup target + npm --target_arch.
            runner: macos-14
            target: x86_64-apple-darwin
            npm_arch: x64
            args: "--target x86_64-apple-darwin"
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            npm_arch: x64
            args: ""
    runs-on: ${{ matrix.runner }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cmi-app/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cmi-app/src-tauri/Cargo.lock') }}

      - name: Install backend dependencies
        shell: bash
        working-directory: cmi-back
        # --target_arch tells prebuild-install (used by better-sqlite3) to
        # download the binary matching the dmg's target architecture,
        # which differs from the runner's host arch when cross-compiling.
        run: |
          npm install --omit=dev --target_arch=${{ matrix.npm_arch }} --target_platform=${{ runner.os == 'Windows' && 'win32' || (runner.os == 'macOS' && 'darwin' || 'linux') }}

      - name: Install frontend dependencies
        run: npm ci || npm install
        working-directory: cmi-front

      - name: Fetch sidecar binaries
        shell: bash
        working-directory: cmi-app
        run: |
          ./scripts/fetch-node.sh
          ./scripts/fetch-cloudflared.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cmi-app
          tagName: ${{ github.ref_name }}
          releaseName: "CMI ${{ github.ref_name }}"
          releaseBody: "Automated build for ${{ github.ref_name }}."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
